# OmniPresence Engine - all-in-one self-host stack.
#
#   docker compose up -d                  # app + OmniData + worker + Redis (keyless data on by default)
#   docker compose --profile keyless up   # also start SearXNG + Ollama (free SERP + open-model AI)
#
# Railway deploys each of these as a separate service instead; see DEPLOY.md.
version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - omni-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  omnidata:
    build:
      context: ./services/omnidata
      args:
        # Bundle Chromium so the keyless SERP/Maps scrape fallback works.
        INSTALL_CHROMIUM: ${OMNIDATA_INSTALL_CHROMIUM:-true}
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      OMNIDATA_API_KEY: ${OMNIDATA_API_KEY:-dev-local-key}
      OMNIDATA_SIGNING_SECRET: ${OMNIDATA_SIGNING_SECRET:-}
      OMNIDATA_ENABLE_SCRAPE: ${OMNIDATA_ENABLE_SCRAPE:-true}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY:-}
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      WEBGRAPH_DB_PATH: /data/webgraph.duckdb
      PORT: "8787"
    volumes:
      - omni-data:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  omnidata-worker:
    build:
      context: ./services/omnidata
      args:
        INSTALL_CHROMIUM: ${OMNIDATA_INSTALL_CHROMIUM:-true}
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    environment:
      REDIS_URL: redis://redis:6379
      OMNIDATA_ENABLE_SCRAPE: ${OMNIDATA_ENABLE_SCRAPE:-true}
      WEBGRAPH_DB_PATH: /data/webgraph.duckdb
    volumes:
      - omni-data:/data
    depends_on:
      redis:
        condition: service_healthy

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      PORT: "3000"
      # OmniData on by default so SERP/backlinks/crawl run without paid vendors.
      OMNIDATA_BASE_URL: ${OMNIDATA_BASE_URL:-http://omnidata:8787}
      OMNIDATA_API_KEY: ${OMNIDATA_API_KEY:-dev-local-key}
      # Keyless engine URLs — present so the app uses them when the `keyless`
      # profile services are up; harmless (graceful-degrade) when they are not.
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      LANGUAGETOOL_URL: ${LANGUAGETOOL_URL:-http://languagetool:8010}
    depends_on:
      omnidata:
        condition: service_started

  # --- Optional keyless services (Phase 8) — `--profile keyless` ---
  searxng:
    image: searxng/searxng:latest
    profiles: ["keyless"]
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_URL:-http://searxng:8080}
    ports:
      - "8080:8080"
    volumes:
      - searxng-config:/etc/searxng

  ollama:
    image: ollama/ollama:latest
    profiles: ["keyless"]
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama

  # Pulls the default model once on first start so keyless AI probes work.
  # Override the model with OLLAMA_MODEL (must match the app's OLLAMA_MODEL).
  ollama-pull:
    image: ollama/ollama:latest
    profiles: ["keyless"]
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command: ["sleep 5 && OLLAMA_HOST=http://ollama:11434 ollama pull ${OLLAMA_MODEL:-llama3.1:8b}"]
    depends_on:
      - ollama

  # LanguageTool — keyless grammar/style engine for editorial QA.
  languagetool:
    image: erikvl87/languagetool:latest
    profiles: ["keyless"]
    restart: unless-stopped
    environment:
      Java_Xmx: 512m
    ports:
      - "8010:8010"

volumes:
  omni-redis:
  omni-data:
  searxng-config:
  ollama-models:
