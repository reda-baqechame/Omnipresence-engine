name: Benchmark Live

# Nightly provider benchmark (automation re-enabled with MANUAL_ONLY_MODE=false).
on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  benchmark-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm install --no-audit --no-fund
      - name: benchmark:live refresh
        run: npm run benchmark:live
        continue-on-error: true
        env:
          OMNIDATA_BASE_URL: ${{ secrets.OMNIDATA_BASE_URL }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
