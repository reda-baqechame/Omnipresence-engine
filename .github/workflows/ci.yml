name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies (Linux optional native bindings)
        run: |
          rm -rf node_modules
          npm install --no-audit --no-fund --include=optional
          npm install --no-save \
            @tailwindcss/oxide-linux-x64-gnu@4.3.1 \
            lightningcss-linux-x64-gnu@1.32.0 \
            @next/swc-linux-x64-gnu@16.2.9
      - name: Install OmniData deps (for verify:all parity/tests)
        run: npm install --no-audit --no-fund --prefix services/omnidata
      - name: Install AI UI Capture deps (for verify:all tests)
        run: npm install --no-audit --no-fund --prefix services/ai-ui-capture
      # Single source of truth: route-auth, schema/column coverage,
      # claims-benchmark, engine unit tests, typecheck, lint, build, and
      # OmniData typecheck/parity/tests all run here.
      - name: verify:all (full gate)
        run: npm run verify:all
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
      - name: Zero-paid-keys sovereignty audit
        run: npm run audit:zero-paid-keys
      - name: Provider superiority audit (strict)
        run: npm run audit:superiority:strict

  e2e-happy-path:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm install --no-audit --no-fund --include=optional
      - name: Install OmniData deps
        run: npm install --no-audit --no-fund --prefix services/omnidata
      - name: E2E happy-path structure
        run: npm run e2e:happy-path

  smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies (Linux optional native bindings)
        run: |
          rm -rf node_modules
          npm install --no-audit --no-fund --include=optional
          npm install --no-save \
            @tailwindcss/oxide-linux-x64-gnu@4.3.1 \
            lightningcss-linux-x64-gnu@1.32.0 \
            @next/swc-linux-x64-gnu@16.2.9
      - name: Build for smoke
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
      - run: npm run start &
      - run: npx wait-on http://localhost:3000 -t 120000
      - run: npm run smoke
        env:
          SMOKE_BASE_URL: http://localhost:3000
