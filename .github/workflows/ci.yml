name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies (Linux optional native bindings)
        run: |
          rm -rf node_modules
          npm install --no-audit --no-fund --include=optional
          npm install --no-save \
            @tailwindcss/oxide-linux-x64-gnu@4.3.1 \
            lightningcss-linux-x64-gnu@1.32.0 \
            @next/swc-linux-x64-gnu@16.2.9
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
      - name: OmniData tests
        run: |
          npm install --no-audit --no-fund --prefix services/omnidata
          npm test --prefix services/omnidata
      - run: npm run start &
      - run: npx wait-on http://localhost:3000 -t 120000
      - run: npm run smoke
        env:
          SMOKE_BASE_URL: http://localhost:3000
