name: Production Gate

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - ".github/workflows/production-gate.yml"

jobs:
  production-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --no-audit --no-fund
      - name: verify:all
        run: npm run verify:all
      - name: railway:verify
        if: ${{ secrets.OMNIDATA_BASE_URL != '' && secrets.AI_UI_CAPTURE_URL != '' }}
        run: npm run railway:verify
        env:
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
          OMNIDATA_BASE_URL: ${{ secrets.OMNIDATA_BASE_URL }}
          OMNIDATA_API_KEY: ${{ secrets.OMNIDATA_API_KEY }}
          AI_UI_CAPTURE_URL: ${{ secrets.AI_UI_CAPTURE_URL }}
      - name: production:ready
        if: ${{ secrets.SMOKE_BASE_URL != '' }}
        run: npm run production:ready
        env:
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
          OMNIDATA_BASE_URL: ${{ secrets.OMNIDATA_BASE_URL }}
          AI_UI_CAPTURE_URL: ${{ secrets.AI_UI_CAPTURE_URL }}
      - name: claims strict (prod)
        if: ${{ secrets.CLAIMS_STRICT_PROD == '1' }}
        run: npm run check:claims-backed
        env:
          CLAIMS_STRICT_PROD: "1"
          OMNIDATA_BASE_URL: ${{ secrets.OMNIDATA_BASE_URL }}
          OMNIDATA_API_KEY: ${{ secrets.OMNIDATA_API_KEY }}
          AI_UI_CAPTURE_URL: ${{ secrets.AI_UI_CAPTURE_URL }}
          ENABLE_AI_UI_CAPTURE: "true"
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
