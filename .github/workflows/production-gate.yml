name: Production Gate

# Weekly schedule removed for manual-only cost control — still runs on push to main
# and via workflow_dispatch (which can include verify:stress).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "services/**"
      - "scripts/**"
      - ".github/workflows/production-gate.yml"

jobs:
  production-gate:
    runs-on: ubuntu-latest
    env:
      SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
      OMNIDATA_BASE_URL: ${{ secrets.OMNIDATA_BASE_URL }}
      OMNIDATA_API_KEY: ${{ secrets.OMNIDATA_API_KEY }}
      AI_UI_CAPTURE_URL: ${{ secrets.AI_UI_CAPTURE_URL }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      ENABLE_AI_UI_CAPTURE: "true"
      # Full Common Crawl webgraph is NOT provisioned on Railway (needs a 20GB+
      # volume + full ingest — a paid infra decision). Until then the webgraph
      # check warns instead of hard-failing; authority uses fallback providers
      # (OpenPageRank / Cloudflare Radar). Flip to "1" after running the ingest.
      WEBGRAPH_REQUIRE_FULL: "0"
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      RAILWAY_APP_URL: https://omnipresence-engine.vercel.app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies (Linux optional native bindings)
        run: |
          rm -rf node_modules
          npm install --no-audit --no-fund --include=optional
          npm install --no-save \
            @tailwindcss/oxide-linux-x64-gnu@4.3.1 \
            lightningcss-linux-x64-gnu@1.32.0 \
            @next/swc-linux-x64-gnu@16.2.9
      - name: Install OmniData deps (for verify:all parity/tests)
        run: npm install --no-audit --no-fund --prefix services/omnidata
      - name: Install AI UI Capture deps (for verify:all tests)
        run: npm install --no-audit --no-fund --prefix services/ai-ui-capture
      - name: verify:all
        run: npm run verify:all
      - name: railway:verify
        run: npm run railway:verify
      - name: production:ready
        # verify:all already ran above — skip the duplicate (also avoids
        # historical maxBuffer false-fails when production-ready buffered output).
        run: npm run production:ready
        env:
          PRODUCTION_READY_SKIP_VERIFY_ALL: "1"
      - name: verify:stress (weekly load proof)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: npm run verify:stress
        env:
          CI: "true"
          VERIFY_REQUIRE_FILES: "1"
      - name: claims strict (prod)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        run: CLAIMS_STRICT_PROD=1 npm run check:claims-backed
